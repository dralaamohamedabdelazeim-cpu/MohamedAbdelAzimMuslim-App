workflows:
  react-native-android:
    name: محمد عبد العظيم الطويل - APK
    max_build_duration: 90
    environment:
      java: 17
      node: 18
    cache:
      cache_paths:
        - $HOME/.yarn
        - node_modules

    scripts:
      - name: تثبيت Yarn
        script: npm install -g yarn

      - name: تثبيت المكتبات
        script: yarn install --immutable

      - name: تحضير اللغات
        script: |
          cp lingui.config.js.example lingui.config.js || true
          yarn lingui compile || true

      - name: إعداد Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: صلاحيات gradlew
        script: chmod +x android/gradlew

      - name: بناء APK
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon -x lint

    artifacts:
      - android/app/build/outputs/apk/release/app-release-unsigned.apk
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - dr.alaamohamedabdelazelm@gmail.com
        notify:
          success: true
          failure: true
